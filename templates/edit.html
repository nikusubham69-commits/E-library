<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Edit Book Details</h1>
    </header>

    <main style="max-width: 500px; margin: auto;">
        <form action="/edit/{{ book._id }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <label>Title:</label>
            <input type="text" name="title" value="{{ book.title }}" required>
            
            <label>Author:</label>
            <input type="text" name="author" value="{{ book.author }}" required>
            
            <label>Year:</label>
            <input type="text" name="year" value="{{ book.year }}">

            <label>Status:</label>
            <select name="status">
                <option value="Available" {% if book.status == 'Available' %}selected{% endif %}>Available</option>
                <option value="Issued" {% if book.status == 'Issued' %}selected{% endif %}>Issued</option>
            </select>

            <button type="submit" style="background-color: #2980b9;">Update Book</button>
            <a href="/" style="text-align: center; margin-top: 10px; color: #7f8c8d;">Cancel</a>
        </form>
    </main>
</body>
</html>
