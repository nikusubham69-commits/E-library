<!DOCTYPE html>
<html>
<head>
    <title>Authentication</title>
    <style>
        body { font-family: 'Arial'; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>E-Library Portal</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Continue</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem;">
            {% if request.path == '/login' %}
                No account? <a href="/signup">Sign up</a>
            {% else %}
                Have account? <a href="/login">Login</a>
            {% endif %}
        </p>
    </div>
</body>
</html>
